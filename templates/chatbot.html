<!DOCTYPE html>
<html>
<head>
<title>AI Disaster Assistant</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>
body {
    background: linear-gradient(to right, #eef2f3, #dfe9f3);
    font-family: Arial, sans-serif;
}

.chat-wrapper {
    max-width: 850px;
    margin: 40px auto;
}

.chat-header {
    text-align: center;
    margin-bottom: 20px;
}

.chat-header h2 {
    color: #dc3545;
    font-weight: bold;
}

.chat-header p {
    color: #555;
}

#chatbox {
    height: 500px;
    overflow-y: auto;
    padding: 20px;
    background: rgba(255,255,255,0.9);
    border-radius: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

/* USER MESSAGE */
.user {
    text-align: right;
    margin: 12px;
}

.user span {
    background: #0d6efd;
    color: white;
    padding: 10px 14px;
    border-radius: 18px 18px 0 18px;
    display: inline-block;
    max-width: 70%;
}

/* BOT MESSAGE */
.bot {
    text-align: left;
    margin: 12px;
}

.bot span {
    background: #f1f3f5;
    color: #222;
    padding: 10px 14px;
    border-radius: 18px 18px 18px 0;
    display: inline-block;
    max-width: 70%;
}

/* INPUT AREA */
.chat-input {
    margin-top: 15px;
    display: flex;
    gap: 10px;
}

.chat-input input {
    flex: 1;
    border-radius: 12px;
    padding: 12px;
}

.chat-input button {
    border-radius: 12px;
    padding: 10px 20px;
}

/* QUICK BUTTONS */
.quick-actions {
    margin-bottom: 15px;
    text-align: center;
}

.quick-actions button {
    margin: 5px;
    border-radius: 20px;
}
</style>

</head>

<body>

<div class="chat-wrapper">

    <div class="chat-header">
        <h2>🤖 AI Disaster Assistant</h2>
        <p>Get emergency guidance, safety tips & disaster support instantly</p>
    </div>

    <!-- QUICK QUESTIONS -->
    <div class="quick-actions">
        <button class="btn btn-outline-primary btn-sm" onclick="quickMsg('flood safety')">🌊 Flood</button>

        <button class="btn btn-outline-danger btn-sm" onclick="quickMsg('fire emergency')">🔥 Fire</button>

        <button class="btn btn-outline-warning btn-sm" onclick="quickMsg('earthquake help')">🌍 Earthquake</button>

        <button class="btn btn-outline-secondary btn-sm" onclick="quickMsg('emergency contacts')">📞 Emergency</button>
    </div>

    <div id="chatbox">

        <!-- DEFAULT BOT MESSAGE -->
        <div class="bot">
            <span>
                👋 Hello! I am your AI Disaster Assistant.<br>
                Ask me about:
                flood, fire, earthquake, landslide, emergency contacts, safety tips.
            </span>
        </div>

    </div>

    <div class="chat-input">
        <input type="text" id="msg" class="form-control"
        placeholder="Type your message...">

        <button class="btn btn-danger" onclick="sendMsg()">Send</button>
        <button class="btn btn-secondary" onclick="clearChat()">Clear</button>
    </div>

</div>

<script>

    // LOAD SAVED CHAT HISTORY
window.onload = function() {

    let savedChat = localStorage.getItem("chatHistory");

    if(savedChat){
        document.getElementById("chatbox").innerHTML = savedChat;

        document.getElementById("chatbox").scrollTop =
    document.getElementById("chatbox").scrollHeight;
    }
}

function quickMsg(text){
    document.getElementById("msg").value = text;
    sendMsg();
}

function sendMsg(){

    let msg = document.getElementById("msg").value.trim();

    if(msg === "") return;

    let chatbox = document.getElementById("chatbox");

    // USER MESSAGE
    chatbox.innerHTML +=
        "<div class='user'><span>🧑 " + msg + "</span></div>";

        localStorage.setItem("chatHistory", chatbox.innerHTML);


    chatbox.scrollTop = chatbox.scrollHeight;

    fetch("/chatbot", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: msg})
    })
    .then(res => res.json())
    .then(data => {

        // Typing effect
        chatbox.innerHTML +=
            "<div class='bot' id='typing'><span>🤖 Typing...</span></div>";

        chatbox.scrollTop = chatbox.scrollHeight;

        setTimeout(() => {

            document.getElementById("typing").remove();

            chatbox.innerHTML +=
                "<div class='bot'><span>🤖 " + data.reply + "</span></div>";

                localStorage.setItem("chatHistory", chatbox.innerHTML);

            chatbox.scrollTop = chatbox.scrollHeight;

        }, 800);

    });

    document.getElementById("msg").value = "";
    document.getElementById("msg").focus();
}

document.getElementById("msg").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMsg();
    }
});
function clearChat(){

    localStorage.removeItem("chatHistory");

    document.getElementById("chatbox").innerHTML = `
        <div class='bot'>
            <span>
                👋 Hello! I am your AI Disaster Assistant.<br>
                Ask me about:
                flood, fire, earthquake, landslide, emergency contacts, safety tips.
            </span>
        </div>
    `;
}
w

</script>
</body>
</html>
