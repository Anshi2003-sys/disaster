<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Alert</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
background:#f4f6f9;
font-family:Arial;
}

.form-box{
max-width:600px;
margin:50px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

textarea{
height:150px;
resize:none;
}

</style>

</head>

<body>

<div class="form-box">

<h2 class="mb-4">✏ Edit Alert</h2>

<form method="POST">

<div class="mb-3">

<label class="form-label">Alert Title</label>

<input
type="text"
name="title"
class="form-control"
value="{{ alert.title }}"
required>

</div>

<div class="mb-3">

<label class="form-label">Alert Message</label>

<textarea
name="message"
class="form-control"
required>{{ alert.message }}</textarea>

</div>

<button type="submit" class="btn btn-primary">
Update Alert
</button>

</form>

</div>

</body>
</html>
