<!DOCTYPE html>
<html>
<head>

<title>Mizoram Disaster Intelligence Map</title>

<!-- Leaflet -->
<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<!-- Bootstrap -->
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<!-- Marker Cluster -->
<link rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<style>

body{
    overflow-x:hidden;
}

#map{
    height:85vh;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

.legend{
    position:absolute;
    bottom:20px;
    left:20px;
    background:white;
    padding:12px;
    border-radius:10px;
    box-shadow:0 0 12px rgba(0,0,0,0.3);
    z-index:1000;
    font-size:14px;
}

.popup-box{
    font-size:14px;
}

.popup-box img{
    width:100%;
    border-radius:8px;
    margin-top:8px;
}

.filter-buttons{
    margin-bottom:15px;
}

#markerCount{
    font-weight:bold;
    margin-bottom:10px;
}

</style>

</head>

<body class="bg-light">

<h2 class="text-center mt-3 text-danger">
🚨 Mizoram Disaster Intelligence Map
</h2>

<!-- FILTER BUTTONS -->
<div class="text-center filter-buttons">

    <button onclick="filterMarkers('ALL')"
    class="btn btn-dark btn-sm">
    All
    </button>

    <button onclick="filterMarkers('HIGH')"
    class="btn btn-danger btn-sm">
    High
    </button>

    <button onclick="filterMarkers('MEDIUM')"
    class="btn btn-warning btn-sm">
    Medium
    </button>

    <button onclick="filterMarkers('LOW')"
    class="btn btn-success btn-sm">
    Low
    </button>

</div>

<!-- LIVE COUNT -->
<h5 id="markerCount"
class="text-center text-danger">
Showing All Disaster Locations
</h5>

<!-- MAP -->
<div id="map" class="container"></div>

<!-- LEGEND -->
<div class="legend">

<b>Severity</b><br>

<span style="color:red;">●</span> High Risk<br>
<span style="color:orange;">●</span> Medium Risk<br>
<span style="color:green;">●</span> Low Risk

</div>

<!-- JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<script>

// =============================
// INIT MAP
// =============================

var map = L.map('map').setView([23.1645, 92.9376], 13);


// =============================
// GOOGLE MAP STYLE
// =============================

L.tileLayer(
'https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',
{
    maxZoom:20,
    subdomains:['mt0','mt1','mt2','mt3']
}).addTo(map);


// =============================
// BACKEND REPORT DATA
// =============================

var reports = {{ reports | tojson }};


// =============================
// CLUSTER + STORAGE
// =============================

var markerCluster = L.markerClusterGroup();

var heatData = [];

var allMarkers = [];


// =============================
// COLOR FUNCTION
// =============================

function getColor(severity){

    severity = (severity || "LOW").toUpperCase();

    return severity === 'HIGH'
        ? 'red'
        : severity === 'MEDIUM'
        ? 'orange'
        : 'green';
}


// =============================
// ADD MARKERS
// =============================

reports.forEach(function(report){

    var lat = parseFloat(report.latitude);
    var lon = parseFloat(report.longitude);

    if(!lat || !lon) return;

    var severity =
    (report.severity || "LOW").toUpperCase();

    // CREATE MARKER
    var marker = L.circleMarker([lat, lon], {

        color:getColor(severity),

        fillColor:getColor(severity),

        radius:9,

        fillOpacity:0.85,

        weight:1

    });

    // POPUP CONTENT
    var popupContent = `

    <div class="popup-box">

    <h6 style="color:${getColor(severity)};">
    🚨 ${report.disaster_name}
    </h6>

    <b>📍 Location:</b>
    ${report.location}<br>

    <b>⚠ Severity:</b>
    <span style="color:${getColor(severity)};">
    ${severity}
    </span><br>

    <b>👤 Reported by:</b>
    ${report.reported_by}<br>

    <b>📝 Description:</b><br>

    ${report.description}

    `;

    // IMAGE IF EXISTS
    if(report.image){

        popupContent += `
        <img src="/static/uploads/${report.image}">
        `;
    }

    popupContent += `</div>`;

    // BIND POPUP
    marker.bindPopup(popupContent);

    // ADD TO CLUSTER
    markerCluster.addLayer(marker);

    // STORE
    allMarkers.push({
        marker:marker,
        severity:severity
    });

    // HEATMAP INTENSITY
    let intensity =
        severity === 'HIGH'
        ? 1
        : severity === 'MEDIUM'
        ? 0.6
        : 0.3;

    heatData.push([lat, lon, intensity]);

});


// =============================
// ADD CLUSTER TO MAP
// =============================

map.addLayer(markerCluster);


// =============================
// HEATMAP
// =============================

var heatLayer = L.heatLayer(heatData, {

    radius:25,

    blur:15

}).addTo(map);


// =============================
// FILTER + AUTO ZOOM + HIGHLIGHT
// =============================

function filterMarkers(level){

    // CLEAR OLD MARKERS
    markerCluster.clearLayers();

    let bounds = [];

    let count = 0;

    allMarkers.forEach(function(obj){

        if(level === "ALL" ||
        obj.severity === level){

            // ADD MATCHED MARKER
            markerCluster.addLayer(obj.marker);

            // HIGHLIGHT EFFECT
            obj.marker.setStyle({

                radius:15,

                weight:3,

                fillOpacity:1

            });

            // SAVE LOCATION
            bounds.push(
                obj.marker.getLatLng()
            );

            count++;

        }else{

            // DIM OTHER MARKERS
            obj.marker.setStyle({

                radius:7,

                weight:1,

                fillOpacity:0.4

            });
        }

    });

    // AUTO ZOOM TO AREA
    if(bounds.length > 0){

        map.fitBounds(bounds, {

            padding:[50,50]

        });
    }

    // UPDATE COUNT
    if(level === "ALL"){

        document.getElementById(
        "markerCount").innerHTML =

        `Showing All Disaster Locations`;

    }else{

        document.getElementById(
        "markerCount").innerHTML =

        `${count} ${level} Severity Locations Highlighted`;
    }

}


// =============================
// LIVE USER LOCATION
// =============================

var userMarker;

function showLiveLocation(position){

    var lat = position.coords.latitude;

    var lon = position.coords.longitude;

    // REMOVE OLD MARKER
    if(userMarker){

        map.removeLayer(userMarker);
    }

    // ADD USER MARKER
    userMarker = L.marker([lat, lon])

    .addTo(map)

    .bindPopup("📍 You are here");

}


// =============================
// WATCH LOCATION
// =============================

if(navigator.geolocation){

    navigator.geolocation.watchPosition(
    showLiveLocation);

}else{

    alert("Geolocation not supported");
}


// =============================
// OPTIONAL ROAD HIGHLIGHT
// =============================

var mzuRoad = [

    [23.1645, 92.9376],

    [23.1655, 92.9390],

    [23.1665, 92.9405]

];

L.polyline(mzuRoad, {

    color:'blue',

    weight:5

}).addTo(map)

.bindPopup("MZU Road");

</script>

</body>
</html>
