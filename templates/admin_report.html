<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Disaster Report</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>
body {
    background: #f4f6f9;
}

.card {
    border: none;
    box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="container mt-5">
<div class="card p-4">

<h2 class="text-center mb-4 text-danger">Admin Disaster Report</h2>

<form method="POST">

<!-- Disaster Type -->
<div class="mb-3">
<label>Disaster Type</label>
<select name="disaster_id" class="form-control" required>
{% for d in disasters %}
<option value="{{ d.disaster_id }}">{{ d.disaster_name }}</option>
{% endfor %}
</select>
</div>

<!-- District -->
<div class="mb-3">
<label>District</label>
<select name="district" class="form-control" required>
    <option value="">Select District</option>
    <option value="Aizawl">Aizawl</option>
    <option value="Champhai">Champhai</option>
    <option value="Lunglei">Lunglei</option>
    <option value="Serchhip">Serchhip</option>
    <option value="Kolasib">Kolasib</option>
</select>
</div>

<!-- Area -->
<div class="mb-3">
<label>Area / Locality</label>
<input type="text" name="area" class="form-control"
placeholder="Enter area, street, locality" required>
</div>

<!-- Description -->
<div class="mb-3">
<label>Description</label>
<textarea name="description" class="form-control" rows="4"
placeholder="Describe the disaster situation" required></textarea>
</div>

<!-- Submit -->
<button type="submit" class="btn btn-danger w-100">
Publish Disaster Alert
</button>

</form>

</div>
</div>

</body>
</html>
